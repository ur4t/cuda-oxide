<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 540" font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style type="text/css">
      @font-face { font-family: 'NVIDIA'; font-style: normal; font-weight: 400; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Rg.woff2') format('woff2'); }
      @font-face { font-family: 'NVIDIA'; font-style: normal; font-weight: 700; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Bd.woff2') format('woff2'); }
      @font-face { font-family: 'RobotoMono'; font-style: normal; font-weight: 400; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/Roboto_Mono/static/RobotoMono-Regular.ttf') format('truetype'); }
    </style>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5"/></pattern>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#79c0ff"/><stop offset="50%" stop-color="#e8912d"/><stop offset="100%" stop-color="#d2a8ff"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1260" height="540" fill="#0d1117"/>
  <rect width="1260" height="540" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="630" y="40" text-anchor="middle" font-size="28" font-weight="500" fill="#ffffff" letter-spacing="-0.5">Crate Dependency Flow</text>
  <line x1="380" y1="54" x2="880" y2="54" stroke="url(#titleAccent)" stroke-width="2" opacity="0.8"/>
  <text x="630" y="76" text-anchor="middle" font-size="16" fill="#b1bac4">How the compiler crates connect</text>

  <!-- Main panel -->
  <rect x="40" y="100" width="1180" height="410" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="40" y="100" width="1180" height="410" rx="12" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- ============================================================ -->
  <!-- TOP ROW: Pipeline crates                                      -->
  <!-- ============================================================ -->

  <!-- rustc-codegen-cuda -->
  <rect x="100" y="128" width="210" height="42" rx="8" fill="rgba(121,192,255,0.08)" stroke="#79c0ff" stroke-width="2"/>
  <text x="205" y="154" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#79c0ff">rustc-codegen-cuda</text>

  <!-- Arrow: rustc-codegen-cuda -> mir-importer -->
  <line x1="310" y1="149" x2="420" y2="149" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="420,144 432,149 420,154" fill="#c9d1d9" opacity="0.7"/>

  <!-- mir-importer -->
  <rect x="432" y="128" width="210" height="42" rx="8" fill="rgba(232,145,45,0.08)" stroke="#e8912d" stroke-width="2"/>
  <text x="537" y="154" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#e8912d">mir-importer</text>

  <!-- Arrow: mir-importer -> mir-lower -->
  <line x1="642" y1="149" x2="752" y2="149" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="752,144 764,149 752,154" fill="#c9d1d9" opacity="0.7"/>

  <!-- mir-lower -->
  <rect x="764" y="128" width="210" height="42" rx="8" fill="rgba(232,145,45,0.08)" stroke="#e8912d" stroke-width="2"/>
  <text x="869" y="154" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#e8912d">mir-lower</text>

  <!-- ============================================================ -->
  <!-- MIDDLE ROW: Dialect crates                                    -->
  <!-- ============================================================ -->

  <!-- Arrow: mir-importer -> dialect-mir (vertical) -->
  <line x1="537" y1="170" x2="537" y2="256" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="532,256 537,268 542,256" fill="#c9d1d9" opacity="0.7"/>

  <!-- dialect-mir -->
  <rect x="432" y="268" width="210" height="42" rx="8" fill="rgba(232,145,45,0.08)" stroke="#e8912d" stroke-width="2"/>
  <text x="537" y="294" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#e8912d">dialect-mir</text>

  <!-- Arrow: mir-lower -> llvm-export (vertical) -->
  <line x1="869" y1="170" x2="869" y2="256" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="864,256 869,268 874,256" fill="#c9d1d9" opacity="0.7"/>

  <!-- llvm-export -->
  <rect x="764" y="268" width="210" height="42" rx="8" fill="rgba(210,168,255,0.08)" stroke="#d2a8ff" stroke-width="2"/>
  <text x="869" y="294" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#d2a8ff">llvm-export</text>

  <!-- Arrow: llvm-export -> dialect-nvvm (horizontal) -->
  <line x1="974" y1="289" x2="1024" y2="289" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="1024,284 1036,289 1024,294" fill="#c9d1d9" opacity="0.7"/>

  <!-- dialect-nvvm -->
  <rect x="1036" y="268" width="150" height="42" rx="8" fill="rgba(210,168,255,0.08)" stroke="#d2a8ff" stroke-width="2"/>
  <text x="1111" y="294" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#d2a8ff">dialect-nvvm</text>

  <!-- ============================================================ -->
  <!-- BOTTOM ROW: Foundation                                        -->
  <!-- ============================================================ -->

  <!-- Arrows: dialect-mir -> pliron -->
  <line x1="537" y1="310" x2="537" y2="396" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="532,396 537,408 542,396" fill="#c9d1d9" opacity="0.7"/>

  <!-- Arrows: llvm-export -> pliron -->
  <line x1="869" y1="310" x2="869" y2="396" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="864,396 869,408 874,396" fill="#c9d1d9" opacity="0.7"/>

  <!-- Arrows: dialect-nvvm -> pliron -->
  <line x1="1111" y1="310" x2="1111" y2="396" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="1106,396 1111,408 1116,396" fill="#c9d1d9" opacity="0.7"/>

  <!-- pliron -->
  <rect x="100" y="408" width="1086" height="42" rx="8" fill="rgba(48,54,61,0.25)" stroke="#30363d" stroke-width="2"/>
  <text x="643" y="434" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#8b949e">pliron</text>

  <!-- ============================================================ -->
  <!-- External input: rustc_public                                  -->
  <!-- ============================================================ -->

  <!-- rustc_public box (far left, aligned with middle row) -->
  <rect x="100" y="268" width="210" height="42" rx="8" fill="rgba(121,192,255,0.08)" stroke="#79c0ff" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="205" y="294" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="13" font-weight="700" fill="#79c0ff">rustc_public</text>

  <!-- Arrow: rustc_public -> mir-importer (elbow with two 90-degree bends) -->
  <path d="M 260,268 V 218 H 480 V 178" fill="none" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="474,182 480,170 486,182" fill="#c9d1d9" opacity="0.7"/>

  <!-- Arrow: rustc_public -> rustc-codegen-cuda (vertical upward) -->
  <line x1="170" y1="268" x2="170" y2="182" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="165,182 170,170 175,182" fill="#c9d1d9" opacity="0.7"/>

  <!-- ============================================================ -->
  <!-- LEGEND                                                        -->
  <!-- ============================================================ -->
  <g transform="translate(1000, 118)">
    <rect x="0" y="0" width="180" height="105" rx="8" fill="rgba(13,17,23,0.7)" stroke="#30363d" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="700" fill="#8b949e">LEGEND</text>
    <line x1="12" y1="26" x2="168" y2="26" stroke="#30363d" stroke-width="1"/>
    <rect x="12" y="34" width="14" height="10" rx="3" fill="rgba(121,192,255,0.08)" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="32" y="43" font-size="11" fill="#b1bac4">Entry / External</text>
    <rect x="12" y="52" width="14" height="10" rx="3" fill="rgba(232,145,45,0.08)" stroke="#e8912d" stroke-width="1.5"/>
    <text x="32" y="61" font-size="11" fill="#b1bac4">MIR Pipeline</text>
    <rect x="12" y="70" width="14" height="10" rx="3" fill="rgba(210,168,255,0.08)" stroke="#d2a8ff" stroke-width="1.5"/>
    <text x="32" y="79" font-size="11" fill="#b1bac4">LLVM / NVVM Dialect</text>
    <rect x="12" y="88" width="14" height="10" rx="3" fill="rgba(48,54,61,0.25)" stroke="#30363d" stroke-width="1.5"/>
    <text x="32" y="97" font-size="11" fill="#b1bac4">Foundation</text>
  </g>
</svg>
